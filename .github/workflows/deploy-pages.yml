name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p "_site"
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name '_site' \
            -exec cp -R {} "_site/" \;
          cat > "_site/index.html" <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./%E6%AF%95%E4%B8%9A%E7%8F%AD%E6%8F%90%E5%89%8D%E8%80%83/">
            <title>Redirecting</title>
          </head>
          <body>
            <p>Redirecting. If the page does not open automatically, use <a href="./%E6%AF%95%E4%B8%9A%E7%8F%AD%E6%8F%90%E5%89%8D%E8%80%83/">this link</a>.</p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
